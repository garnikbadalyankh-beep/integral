<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Integral Solver</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
    margin-top: 40px;
}

h2 {
    color: #38bdf8;
}

input {
    width: 320px;
    font-size: 18px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.button-grid {
    margin-top: 20px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #1e293b;
    color: white;
}

button:hover {
    background: #38bdf8;
    color: black;
}

.solve {
    background: #22c55e;
    font-weight: bold;
}

.chat {
    background: #f59e0b;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    color: #22c55e;
}
</style>
</head>

<body>

<h2>🔥 Integral Solver</h2>

<input type="text" id="input" placeholder="օրինակ՝ x^2 + sin(x)">

<div class="button-grid">
<button onclick="add('x')">x</button>
<button onclick="add('^2')">x²</button>
<button onclick="add('sin(')">sin</button>
<button onclick="add('cos(')">cos</button>
<button onclick="add('+')">+</button>
<button onclick="add('-')">-</button>
<button onclick="add('*')">*</button>
<button onclick="add('/')">/</button>
<button onclick="clearInput()">C</button>
</div>

<br>

<button class="solve" onclick="solve()">Solve ∫</button>

<br><br>

<button class="chat" onclick="openChat()">Open ChatGPT</button>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
